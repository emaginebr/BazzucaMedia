services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: bazzuca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: bazzuca-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - emagine-network
    depends_on:
      bazzuca-api:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: emagine-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  bazzuca-api:
    build:
      context: .
      dockerfile: BazzucaAPI.Dockerfile
    image: bazzuca-bazzuca-api:latest
    container_name: bazzuca-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Tenant__DefaultTenantId=bazzuca
      - Tenants__bazzuca__ConnectionString=Host=bazzuca-postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Tenants__bazzuca__JwtSecret=${JWT_SECRET}
      - NAuth__JwtSecret=${JWT_SECRET}
      - RabbitMQ__HostName=emagine-rabbitmq
    ports:
      - "${API_HTTP_PORT:-5010}:80"
    volumes:
      - bazzuca_logs:/app/logs
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bazzuca-worker:
    build:
      context: .
      dockerfile: BazzucaWorker.Dockerfile
    image: bazzuca-bazzuca-worker:latest
    container_name: bazzuca-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Tenant__DefaultTenantId=bazzuca
      - Tenants__bazzuca__ConnectionString=Host=bazzuca-postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Tenants__bazzuca__JwtSecret=${JWT_SECRET}
      - RabbitMQ__HostName=emagine-rabbitmq
    volumes:
      - worker_playwright_data:/app/playwright-data
    networks:
      - emagine-network

volumes:
  postgres_data:
    driver: local
  bazzuca_logs:
    driver: local
  prometheus_data:
    driver: local
  worker_playwright_data:
    driver: local

networks:
  emagine-network:
    name: emagine-network
    external: true
