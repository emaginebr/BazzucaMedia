services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: bazzuca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bazzuca-api:
    build:
      context: .
      dockerfile: BazzucaAPI.Dockerfile
    image: bazzuca-bazzuca-api:latest
    container_name: bazzuca-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - Tenant__DefaultTenantId=${DEFAULT_TENANT_ID:-bazzuca}
      - Tenants__bazzuca__ConnectionString=${BAZZUCA_CONNECTION_STRING}
      - Tenants__bazzuca__JwtSecret=${BAZZUCA_JWT_SECRET}
      - NAuth__JwtSecret=${BAZZUCA_JWT_SECRET}
    ports:
      - "${API_HTTP_PORT:-5010}:80"
    volumes:
      - bazzuca_logs:/app/logs
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  bazzuca_logs:
    driver: local

networks:
  emagine-network:
    name: emagine-network
    external: true
