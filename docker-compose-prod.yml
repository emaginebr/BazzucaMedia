services:
  bazzuca-api:
    build:
      context: .
      dockerfile: BazzucaAPI.Dockerfile
    image: bazzuca-bazzuca-api:latest
    container_name: bazzuca-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Tenant__DefaultTenantId=bazzuca
      - Tenants__bazzuca__ConnectionString=${BAZZUCA_CONNECTION_STRING}
      - Tenants__bazzuca__JwtSecret=${BAZZUCA_JWT_SECRET}
      - NAuth__JwtSecret=${BAZZUCA_JWT_SECRET}
      - RabbitMQ__HostName=emagine-rabbitmq
      - RabbitMQ__UserName=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-guest}
    # Ports not exposed externally — access via emagine-network
    expose:
      - "80"
    volumes:
      - bazzuca_logs:/app/logs
    networks:
      - emagine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bazzuca-worker:
    build:
      context: .
      dockerfile: BazzucaWorker.Dockerfile
    image: bazzuca-bazzuca-worker:latest
    container_name: bazzuca-worker
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Tenant__DefaultTenantId=bazzuca
      - Tenants__bazzuca__ConnectionString=${BAZZUCA_CONNECTION_STRING}
      - Tenants__bazzuca__JwtSecret=${BAZZUCA_JWT_SECRET}
      - RabbitMQ__HostName=emagine-rabbitmq
      - RabbitMQ__UserName=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - worker_playwright_data:/app/playwright-data
    networks:
      - emagine-network

volumes:
  bazzuca_logs:
    driver: local

  worker_playwright_data:
    driver: local

networks:
  emagine-network:
    name: emagine-network
    external: true
