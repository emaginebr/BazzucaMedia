name: Deploy Production

on:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/bazzuca-media
  COMPOSE_CMD: docker compose --env-file .env.prod -f docker-compose-prod.yml

jobs:
  # ─── 1. Prepare: clone/update repo, inject secrets, create network ───
  prepare:
    runs-on: ubuntu-latest
    steps:
    - name: Update repo & inject secrets
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          set -e
          REPO_URL="https://github.com/${{ github.repository }}.git"
          BRANCH="main"

          if [ -d "$DEPLOY_DIR" ]; then
            echo "Updating existing repository..."
            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git clean -fd
          else
            echo "Cloning repository..."
            git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
          fi

          cat > .env.prod <<'ENVEOF'
          BAZZUCA_CONNECTION_STRING=${{ secrets.BAZZUCA_CONNECTION_STRING }}
          BAZZUCA_JWT_SECRET=${{ secrets.BAZZUCA_JWT_SECRET }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.prod

    - name: Ensure Docker network
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        script: |
          docker network inspect emagine-network >/dev/null 2>&1 || docker network create emagine-network

  # ─── 2. Build API image ───
  build-api:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
    - name: Build API image
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        command_timeout: 60m
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.prod -f docker-compose-prod.yml build bazzuca-api
          echo "API image built successfully."

  # ─── 3. Deploy API ───
  deploy-api:
    runs-on: ubuntu-latest
    needs: build-api
    steps:
    - name: Start API
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.prod -f docker-compose-prod.yml up -d --no-build bazzuca-api
          echo "API started."

  # ─── 4. Build Worker image ───
  build-worker:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
    - name: Build Worker image
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        command_timeout: 60m
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.prod -f docker-compose-prod.yml build bazzuca-worker
          echo "Worker image built successfully."

  # ─── 5. Deploy Worker ───
  deploy-worker:
    runs-on: ubuntu-latest
    needs: build-worker
    steps:
    - name: Start Worker
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.prod -f docker-compose-prod.yml up -d --no-build bazzuca-worker
          echo "Worker started."

  # ─── 6. Verify all services ───
  verify:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker]
    steps:
    - name: Health check API
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          echo "Waiting for API health check..."
          for i in $(seq 1 20); do
            if docker compose --env-file .env.prod -f docker-compose-prod.yml exec -T bazzuca-api curl -sf http://localhost:80/ 2>/dev/null; then
              echo "API is healthy."
              exit 0
            fi
            sleep 3
          done
          echo "API health check timed out!" && exit 1

    - name: Health check Worker
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          set -e
          cd "$DEPLOY_DIR"
          STATUS=$(docker compose --env-file .env.prod -f docker-compose-prod.yml ps --format json bazzuca-worker | grep -o '"State":"[^"]*"' | head -1)
          echo "Worker status: $STATUS"
          if echo "$STATUS" | grep -q "running"; then
            echo "Worker is running."
          else
            echo "Worker is NOT running!" && exit 1
          fi

    - name: Service status overview
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        password: ${{ secrets.PROD_SSH_PASSWORD }}
        port: ${{ secrets.PROD_SSH_PORT }}
        envs: DEPLOY_DIR
        script: |
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.prod -f docker-compose-prod.yml ps

  # ─── 7. Summary ───
  summary:
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
    - name: Deployment summary
      run: |
        echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Server** | \`${{ secrets.PROD_SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | \`main\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Triggered by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Prepare | \`${{ needs.verify.result == 'skipped' && 'skipped' || 'success' }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Build API | \`${{ needs.verify.result }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Worker | \`${{ needs.verify.result }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy API | \`${{ needs.verify.result }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Deploy Worker | \`${{ needs.verify.result }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Verify | \`${{ needs.verify.result }}\` |" >> $GITHUB_STEP_SUMMARY
